---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - id: cache
        name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-${{ matrix.python-version }}

      - name: Install requirements
        run: uv sync

      - name: Run yamllint
        run: |
          uv run yamllint $(git ls-files '*.yaml')

      - name: Run pylint
        run: |
          uv run pylint $(git ls-files '*.py')

      - name: Run clang-format
        run: |
          clang-format --dry-run --Werror $(git ls-files '*.cpp' '*.h')

      - name: Compile
        run: |
          esphome compile dif-pressure-meter.yaml

      - name: "Move files"
        run: |
          echo #
          mkdir dist
          REF_NAME="${{github.ref_name}}"
          mv .esphome/build/dif-pressure-meter/.pioenvs/dif-pressure-meter/firmware.factory.bin \
            "dist/dif-pressure-meter-${REF_NAME//\//-}.bin"

      - name: "Upload"
        uses: actions/upload-artifact@v7
        with:
          name: dif-pressure-meter
          path: dist

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: True
          files: |
            dist/*.bin
